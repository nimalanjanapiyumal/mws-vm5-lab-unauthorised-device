# Netplan template for this VM.
# The setup script auto-detects the interface and writes /etc/netplan/01-mws-static.yaml.
# Use this file as documentation or for manual configuration.
network:
  version: 2
  ethernets:
    enp0s3:
      dhcp4: false
      addresses:
        - 192.168.1.75/24
      routes:
        - to: default
          via: 192.168.1.1
      nameservers:
        addresses:
          - 8.8.8.8
          - 1.1.1.1
